<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro CTO - Técnico</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        :root { --bg-main: #0B0F19; --bg-card: #151A27; --border-color: #2A3441; --border-focus: #3B82F6; --text-main: #E2E8F0; --text-muted: #94A3B8; --btn-primary: #3B82F6; --btn-primary-hover: #2563EB; --btn-secondary: #1E293B; --btn-secondary-hover: #334155; --success: #10B981; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; min-height: 100vh; background-color: var(--bg-card); display: flex; flex-direction: column; border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color); }
        .app-header { padding: 20px 24px; border-bottom: 1px solid var(--border-color); background-color: #111520; position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
        .header-title h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .header-title p { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
        .status-online { font-size: 0.8rem; color: var(--success); font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .form-container { padding: 24px; flex: 1; overflow-y: auto; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .form-group input, .form-group select { width: 100%; background-color: #0B0F19; border: 1px solid var(--border-color); color: var(--text-main); padding: 14px 16px; border-radius: 8px; font-size: 1rem; transition: all 0.2s ease; }
        .form-group input::placeholder { color: #475569; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--border-focus); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        input[readonly] { background-color: rgba(0,0,0,0.2) !important; color: var(--text-muted) !important; cursor: not-allowed; }
        
        .form-row { display: flex; gap: 12px; margin-bottom: 16px; }
        .form-row .form-group { margin-bottom: 0; }
        .form-group.half { flex: 1; }
        .input-with-icon { position: relative; }
        .input-with-icon input { padding-right: 40px; }
        .input-with-icon i { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .input-with-button { display: flex; gap: 8px; }
        .input-with-button input { flex: 1; }
        .btn-icon { background-color: var(--btn-secondary); color: var(--btn-primary); border: 1px solid var(--border-color); border-radius: 8px; width: 52px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 1.2rem; transition: all 0.2s ease; }
        .btn-icon:hover { background-color: var(--btn-secondary-hover); }
        .divider { border: none; border-top: 1px dashed var(--border-color); margin: 20px 0 20px 0; }
        .form-actions { display: flex; gap: 12px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border-color); }
        .btn { padding: 16px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-secondary { background-color: var(--btn-secondary); color: var(--text-main); flex: 1; }
        .btn-secondary:hover { background-color: var(--btn-secondary-hover); }
        .btn-primary { background-color: var(--btn-primary); color: white; flex: 2; }
        .btn-primary:hover { background-color: var(--btn-primary-hover); }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background-color: var(--success); color: white; padding: 14px 24px; border-radius: 50px; font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4); transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 1000; white-space: nowrap; }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-title">
                <h1>REGISTRO TÉCNICO</h1>
                <p>Preenchimento em Campo</p>
            </div>
            <div id="status-sinc" class="status-online"><i class="fa-solid fa-spinner fa-spin"></i> Baixando Abas...</div>
        </header>

        <main class="form-container">
            <form id="cto-form">

                <div class="form-group">
                    <label for="slotPon">SLOT PON (Aba da Planilha)</label>
                    <select id="slotPon" name="slotPon" required>
                        <option value="">Aguardando Sincronização...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="mac">MAC (Buscar / Confirmar)</label>
                    <div class="input-with-icon">
                        <input type="text" id="mac" name="mac" placeholder="Selecione o Slot Primeiro..." list="mac-list" required autocomplete="off" disabled>
                        <i class="fa-solid fa-search"></i>
                    </div>
                    <datalist id="mac-list"></datalist>
                </div>

                <div class="form-group">
                    <label for="cto">CTO DA CAIXA</label>
                    <input type="text" id="cto" name="cto" placeholder="Ex: CTO.03.124" required>
                </div>

                <div class="form-row">
                    <div class="form-group half">
                        <label for="contrato">ID CONTRATO</label>
                        <input type="text" id="contrato" name="contrato" placeholder="Automático" readonly>
                    </div>
                    <div class="form-group half">
                        <label for="tipoCliente">TIPO CLIENTE</label>
                        <input type="text" id="tipoCliente" name="tipoCliente" placeholder="Automático" readonly>
                    </div>
                </div>

                <hr class="divider">

                <div class="form-group">
                    <label for="localizacao">LOCALIZAÇÃO EXATA (GPS do Poste)</label>
                    <div class="input-with-button">
                        <input type="text" id="localizacao" name="localizacao" placeholder="Aguardando GPS..." required readonly>
                        <button type="button" id="btn-gps" class="btn-icon" title="Atualizar GPS"><i class="fa-solid fa-location-crosshairs"></i></button>
                    </div>
                    <small style="color: #94A3B8; font-size: 0.65rem; display: block; margin-top: 4px;">Fique abaixo da caixa e aguarde o Erro ficar abaixo de 10m.</small>
                </div>

                <div class="form-group">
                    <label for="lacre">LACRE A COLOCAR</label>
                    <input type="text" id="lacre" name="lacre" placeholder="Ex: BDO002205" required>
                </div>

                <div class="form-group">
                    <label for="sinalCto">SINAL DA CTO (dBm)</label>
                    <input type="number" step="0.01" id="sinalCto" name="sinalCto" placeholder="Ex: -24.53" required>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="btn-cancelar">Limpar</button>
                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-cloud-arrow-up"></i> Enviar p/ Central</button>
                </div>
            </form>
        </main>
        
        <div id="toast" class="toast hidden">
            <i class="fa-solid fa-check-circle"></i>
            <span>Enviado com Sucesso!</span>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // A SUA NOVA URL DEFINITIVA AQUI:
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-y4hGaFTF_jioONwCJwALNrNy2FM-iyiOdu89PX6-jCgf3Zlcj58PnojSt0pb0-s/exec";

            let fullDatabase = {};
            let currentMacs = [];
            
            const slotPonSelect = document.getElementById('slotPon');
            const macInput = document.getElementById('mac');
            const ctoInput = document.getElementById('cto');
            const contratoInput = document.getElementById('contrato');
            const tipoClienteInput = document.getElementById('tipoCliente');
            const datalist = document.getElementById('mac-list');
            const statusSinc = document.getElementById('status-sinc');
            const toast = document.getElementById('toast');
            const toastMsg = toast.querySelector('span');
            const locInput = document.getElementById('localizacao');
            const btnGps = document.getElementById('btn-gps');
            const form = document.getElementById('cto-form');

            // 1. CARREGAR TODAS AS ABAS DA PLANILHA
            async function loadDatabase() {
                try {
                    const res = await fetch(SCRIPT_URL);
                    fullDatabase = await res.json();
                    
                    slotPonSelect.innerHTML = '<option value="">Selecione o Slot PON...</option>';
                    
                    // Cria as opções de cada Aba
                    Object.keys(fullDatabase).forEach(sheetName => {
                        const opt = document.createElement('option');
                        opt.value = sheetName;
                        opt.textContent = sheetName;
                        slotPonSelect.appendChild(opt);
                    });
                    
                    statusSinc.innerHTML = '<i class="fa-solid fa-wifi"></i> Abas Sincronizadas';

                    // RECUPERA O ÚLTIMO SLOT SALVO NA MEMÓRIA DO CELULAR
                    const savedSlot = localStorage.getItem('slotPonSalvo');
                    if (savedSlot && fullDatabase[savedSlot]) {
                        slotPonSelect.value = savedSlot;
                        slotPonSelect.dispatchEvent(new Event('change')); // Força a atualização dos MACs
                    }

                } catch(err) {
                    statusSinc.innerHTML = '<i class="fa-solid fa-triangle-exclamation" style="color: #F59E0B"></i> Erro ao Sincronizar';
                }
            }
            if(SCRIPT_URL.startsWith("http")) { loadDatabase(); }

            // 2. QUANDO O TÉCNICO ESCOLHE A ABA (SLOT PON)
            slotPonSelect.addEventListener('change', (e) => {
                const selectedSlot = e.target.value;
                
                if (!selectedSlot) {
                    localStorage.removeItem('slotPonSalvo');
                    macInput.disabled = true;
                    macInput.placeholder = "Selecione o Slot Primeiro...";
                    return;
                }

                // Salva a escolha do técnico na memória do celular!
                localStorage.setItem('slotPonSalvo', selectedSlot);

                macInput.disabled = false;
                macInput.placeholder = "Digite ou selecione o MAC...";
                currentMacs = fullDatabase[selectedSlot] || [];
                
                datalist.innerHTML = '';
                currentMacs.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.mac;
                    datalist.appendChild(option);
                });
                
                macInput.value = ''; ctoInput.value = ''; contratoInput.value = ''; tipoClienteInput.value = '';
            });

            // 3. BUSCAR O MAC ESPECÍFICO DESSA ABA
            function searchMAC() {
                let typed = macInput.value.trim().toUpperCase();
                const found = currentMacs.find(x => x.mac.toUpperCase() === typed);
                if (found) {
                    ctoInput.value = found.cto;
                    contratoInput.value = found.contrato;
                    tipoClienteInput.value = found.tipoCliente; // Agora puxa certinho da Coluna H
                } else {
                    contratoInput.value = '';
                    tipoClienteInput.value = '';
                }
            }
            
            macInput.addEventListener('input', searchMAC);
            macInput.addEventListener('change', searchMAC);
            macInput.addEventListener('blur', (e) => {
                e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9:]/g, '');
            });

            // 4. GPS DE ALTA PRECISÃO
            let watchId;
            function getGPS() {
                if (watchId) navigator.geolocation.clearWatch(watchId);
                locInput.value = "Calculando GPS Exato...";
                btnGps.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

                if (navigator.geolocation) {
                    watchId = navigator.geolocation.watchPosition(
                        (position) => {
                            const lat = position.coords.latitude;
                            const lng = position.coords.longitude;
                            const acc = position.coords.accuracy;
                            locInput.value = `${lat.toFixed(6)}, ${lng.toFixed(6)} (Erro: ${acc.toFixed(0)}m)`;
                            btnGps.innerHTML = '<i class="fa-solid fa-location-crosshairs"></i>';
                            if (acc <= 10) navigator.geolocation.clearWatch(watchId);
                        },
                        (error) => {
                            locInput.value = "Céu aberto / Permissão negada";
                            btnGps.innerHTML = '<i class="fa-solid fa-location-crosshairs"></i>';
                        },
                        { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
                    );
                } else { locInput.value = "Sem GPS"; }
            }
            getGPS();
            btnGps.addEventListener('click', getGPS);

            // 5. ENVIO PARA O GOOGLE
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                if (!SCRIPT_URL.startsWith("http")) {
                    alert("Aviso: Falta a URL da Planilha no código!");
                    return;
                }

                const btnSubmit = form.querySelector('button[type="submit"]');
                const originalBtnText = btnSubmit.innerHTML;
                btnSubmit.disabled = true;
                btnSubmit.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Transmitindo...';

                const formData = new URLSearchParams();
                formData.append('slotPon', slotPonSelect.value);
                formData.append('mac', macInput.value.trim().toUpperCase());
                formData.append('cto', ctoInput.value.trim().toUpperCase());
                formData.append('localizacao', locInput.value.trim().split(' (')[0]);
                formData.append('contrato', contratoInput.value.trim());
                formData.append('lacre', document.getElementById('lacre').value.trim().toUpperCase());
                formData.append('sinalCto', document.getElementById('sinalCto').value.trim());
                formData.append('tipoCliente', tipoClienteInput.value.trim());
                formData.append('timestamp', new Date().toLocaleString('pt-BR'));

                try {
                    await fetch(SCRIPT_URL, { method: 'POST', body: formData, mode: 'no-cors' });
                    
                    showToast("Enviado para a Planilha!");
                    
                    // Salva o slot atual antes de limpar o form
                    const slotAtual = slotPonSelect.value;
                    
                    form.reset();
                    
                    // Restaura o slot para o técnico não precisar preencher de novo
                    slotPonSelect.value = slotAtual;
                    
                    getGPS();
                } catch (err) {
                    alert("Erro fatal: Aparelho sem internet.");
                }

                btnSubmit.disabled = false;
                btnSubmit.innerHTML = originalBtnText;
            });

            document.getElementById('btn-cancelar').addEventListener('click', () => { 
                if (confirm('Apagar tudo?')) { 
                    const slotAtual = slotPonSelect.value;
                    form.reset(); 
                    slotPonSelect.value = slotAtual;
                    getGPS(); 
                } 
            });

            function showToast(msg) {
                toastMsg.innerText = msg;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 4000);
            }
        });
    </script>
</body>
</html>
